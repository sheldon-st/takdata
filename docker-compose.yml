# Production deployment — uses pre-built images from GitHub Container Registry.
# Run on VPS: docker compose pull && docker compose up -d
# See DEPLOY.md for full setup instructions.

services:
  backend:
    image: ghcr.io/sheldon-st/takdata:latest
    container_name: tak-manager-backend
    restart: unless-stopped
    volumes:
      - tak-data:/app/data
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATA_DIR=/app/data
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
    networks:
      - caddy
      - takdata
    labels:
      caddy: api.data.opengeo.space
      caddy.reverse_proxy: "{{upstreams 8000}}"
    # Backend is NOT exposed on the host — all traffic flows through the frontend nginx

  # frontend:
  #   image: ghcr.io/sheldon-st/takdata-frontend:latest
  #   container_name: tak-manager-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "${HOST_PORT:-80}:80"
  #   networks:
  #     - tak-net
  #   depends_on:
  #     - backend

volumes:
  tak-data:

networks:
  caddy:
    external: true
  takdata:
    external: true
