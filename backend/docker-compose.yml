version: "3.9"

services:
  tak-manager-api:
    build: .
    container_name: tak-manager-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite DB and uploaded certs across container restarts
      - ./data:/app/data
    environment:
      - LOG_LEVEL=INFO
      - DATA_DIR=/app/data
      # Tighten CORS for production, e.g.:
      # - CORS_ORIGINS=["http://localhost:3000","https://yourdomain.com"]
    networks:
      - tak-manager

networks:
  tak-manager:
    driver: bridge
